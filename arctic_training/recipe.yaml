# Arctic Training SFT Recipe
# This recipe fine-tunes Llama-3.1-8B-Instruct on the ultrachat dataset
# See https://github.com/snowflakedb/ArcticTraining for more configuration options

type: sft
micro_batch_size: 2
gradient_accumulation_steps: 4

model:
  name_or_path: meta-llama/Llama-3.1-8B-Instruct

optimizer:
  type: fused_adam
  lr: 1e-5

data:
  sources:
    - HuggingFaceH4/ultrachat_200k

checkpoint:
  - type: huggingface
    save_end_of_training: true
    output_dir: /tmp/fine-tuned-model
