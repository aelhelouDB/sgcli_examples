experiment_name: helloworld-torchrun 
environment:
  env_variables:
    NCCL_DEBUG: "INFO"
  dependencies: requirements.yaml
compute:
  gpus: 2
  gpu_type: a10
max_retries: 0
command: |-
  torchrun \
    --nnodes=2 \
    --nproc_per_node=1 \
    --node_rank=$NODE_RANK \
    --master_addr=$MASTER_ADDR \
    --master_port=$MASTER_PORT \
    /Workspace/Shared/ml-misc/air-examples/sgcli/helloworld/train.py
