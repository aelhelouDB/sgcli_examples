experiment_name: verl-sft-gemma-7b
environment:
  env_variables:
    NCCL_DEBUG: "INFO"
    MLFLOW_TRACKING_URI: "databricks"
  dependencies: requirements.yaml
  env_variables_secrets:   
    HF_TOKEN: "sgc-nightly-notebook/hf_token" # change this to your own hugging face token
compute:
  gpus: 16
  gpu_type: h100
max_retries: 0
code_source:
  type: snapshot
  snapshot:
    git_branch: main
    repo_path: /Users/lin.yuan/work/verl  # change this to your own path to verl repo
command: |-
  # Download the GSM8K dataset to local disk
  python3 $HOME/verl/examples/data_preprocess/gsm8k.py --local_save_dir $HOME/data/gsm8k

  TRAIN_FILES="$HOME/data/gsm8k/train.parquet"
  VAL_FILES="$HOME/data/gsm8k/test.parquet"
  
  set -x
  
  # Shift the arguments so $@ refers to the rest
  shift 2

  torchrun --nnodes=2 --nproc_per_node=8 \
      --node_rank=$NODE_RANK \
      --master_addr=$MASTER_ADDR \
      --master_port=$MASTER_PORT \
      -m verl.trainer.fsdp_sft_trainer \
      data.train_files=$TRAIN_FILES \
      data.val_files=$VAL_FILES \
      data.prompt_key=extra_info \
      data.response_key=extra_info \
      data.prompt_dict_keys=['question'] \
      data.response_dict_keys=['answer'] \
      data.micro_batch_size_per_gpu=4 \
      model.partial_pretrain=google/gemma-1.1-7b-it \
      trainer.default_local_dir="/tmp/checkpoints" \
      trainer.project_name=verl-sft-gemma-7b \
      trainer.experiment_name=verl-sft-gemma-7b-it \
      trainer.total_epochs=1 \
      trainer.logger=['console','mlflow'] $@